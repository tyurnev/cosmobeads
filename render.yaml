services:
  - type: web
    name: cosmobeads
    env: python
    buildCommand: "python3 -m pip install -r requirements.txt && python3 backend/manage.py collectstatic --noinput"
    startCommand: "cd backend && python manage.py migrate --noinput && gunicorn cosmobeads_backend.wsgi:application"
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "cosmobeads.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://cosmobeads.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
